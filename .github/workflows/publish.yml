name: Build and Publish

on:
  push:
    tags:
      - 'v*'  # 只在推送 v 开头的 tag 时触发
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore src/MagicCenterHub

      - name: Build
        run: dotnet build src/MagicCenterHub --configuration Release --no-restore

      - name: Publish
        run: dotnet publish src/MagicCenterHub --configuration Release --no-restore --output ./publish

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            publish/MagicCenterHub.exe
            publish/*.dll
            publish/Resources/MagicCenterHub.ico
            publish/Resources/Claude.png
          generate_release_notes: true
